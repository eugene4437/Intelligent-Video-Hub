name: Quality and Docs Check

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install Tools
      run: pip install pylint mypy pydocstyle streamlit opencv-python-headless ultralytics
    - name: Run Doctests
      run: python -m doctest main.py
    - name: Check Docstrings style
      run: pydocstyle main.py
    - name: Run Pylint
      run: pylint main.py --fail-under=8.0
